<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Password Validator</title>
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #222;
    }
    .form-container{
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
      width: 320px;
    }
    h2{
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }
    .input-group{
      margin-bottom: 15px;
      position: relative;
    }
    .input-group input{
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }
    .input-group small{
      color: red;
      font-size: 12px;
      margin-top: 4px;
      display: none; /* by default hidden */
    }
    button{
      width: 100%;
      padding: 12px;
      background: #007BFF;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }
    button:hover{
      background: #0056b3;
    }
    #valid{
    display: flex;
    /* align-items: center; */
    justify-content: center;
    margin-top: 10px;
    display: none;
    }
  </style>
</head>
<body>
  <div  class="form-container">
    <h2>Login</h2>
    <form autocomplete="off" id="loginForm">
      
      <div class="input-group">
        <input type="email" id="email" placeholder="Enter your email">
        <small id="emailError">Invalid email format</small>
      </div>
      
      <div class="input-group">
        <input type="password" id="password" placeholder="Enter your password">
        <small id="passError">Password must be at least 6 characters</small>
      </div>
      
      <button type="submit">Login</button>

      <div id="valid"><small>Everything is correct</small></div>
    </form>
  </div>
  
  <!-- JS tum add karoge -->
  <script src="script.js"></script>
</body>
</html>
